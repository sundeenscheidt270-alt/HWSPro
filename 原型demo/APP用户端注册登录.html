<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>维他很忙 - 登录/注册</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center font-sans">

    <!-- Mobile Device Simulator -->
    <div class="relative w-full text-slate-800 h-full sm:w-[375px] sm:h-[812px] bg-white sm:rounded-[3rem] sm:border-[8px] sm:border-slate-900 shadow-2xl overflow-hidden flex flex-col">
        
        <!-- Status Bar Simulator -->
        <div class="h-12 bg-white flex justify-between items-end px-6 pb-2 shrink-0 z-20 select-none">
            <span class="font-semibold text-sm">9:41</span>
            <div class="flex items-center space-x-1.5">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14.5v-9l6 4.5-6 4.5z"/></svg>
                <div class="w-4 h-2.5 border border-slate-800 rounded-[2px] relative"><div class="absolute inset-0 bg-slate-800 m-[1px] w-[70%]"></div></div>
            </div>
        </div>

        <!-- Main Content Area -->
        <main class="flex-1 overflow-y-auto no-scrollbar relative">
            
            <!-- View: Login (Password) -->
            <div id="view-login-pwd" class="absolute inset-0 p-8 flex flex-col transition-all duration-300 bg-white z-10">
                <div class="mt-8 mb-8">
                    <img src="https://placehold.co/80x80/0284c7/ffffff?text=Vita" class="w-16 h-16 rounded-2xl mb-6 shadow-blue-200 shadow-lg">
                    <h1 class="text-2xl font-bold text-slate-900 tracking-tight">欢迎回来</h1>
                    <p class="text-slate-500 mt-2 text-sm">请登录您的维他很忙账号</p>
                </div>

                <div class="space-y-5">
                    <div>
                        <input type="tel" maxlength="11" class="w-full px-0 py-3 border-b border-gray-200 focus:border-blue-600 outline-none text-lg bg-transparent transition-colors placeholder-gray-300" placeholder="请输入手机号">
                    </div>
                    <div class="relative">
                        <input type="password" class="w-full px-0 py-3 border-b border-gray-200 focus:border-blue-600 outline-none text-lg bg-transparent transition-colors placeholder-gray-300" placeholder="请输入密码">
                        <button onclick="togglePwdVisibility(this)" class="absolute right-0 top-3 text-gray-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                        </button>
                    </div>
                </div>

                <div class="flex justify-between items-center mt-4">
                    <button onclick="switchView('view-login-sms')" class="text-sm text-slate-500 hover:text-slate-900">验证码登录</button>
                    <button class="text-sm text-blue-600 font-medium">忘记密码?</button>
                </div>

                <button onclick="handleLogin()" class="w-full mt-10 bg-blue-600 hover:bg-blue-700 active:scale-[0.98] transition-all text-white py-4 rounded-xl font-semibold shadow-lg shadow-blue-200 text-lg">
                    登录
                </button>

                <div class="mt-auto pt-8">
                    <div class="relative flex py-5 items-center">
                        <div class="flex-grow border-t border-gray-100"></div>
                        <span class="flex-shrink-0 mx-4 text-gray-300 text-xs">其他登录方式</span>
                        <div class="flex-grow border-t border-gray-100"></div>
                    </div>
                    <div class="flex justify-center space-x-6">
                        <button class="w-12 h-12 rounded-full bg-green-50 flex items-center justify-center text-green-600 hover:bg-green-100 transition-colors">
                            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12c0 5.02 3.66 9.19 8.35 9.88V15h-2.5v-3h2.5v-2.15c0-2.47 1.46-3.83 3.67-3.83 1.06 0 2.18.19 2.18.19v2.4h-1.23c-1.22 0-1.6.76-1.6 1.54V12h2.7l-.43 3h-2.27v6.88C18.34 21.19 22 17.02 22 12c0-5.52-4.48-10-10-10z"/></svg>
                        </button>
                        <button class="w-12 h-12 rounded-full bg-blue-50 flex items-center justify-center text-blue-500 hover:bg-blue-100 transition-colors">
                             <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10c1.85 0 3.58-.52 5.05-1.41.34-.21.28-.75-.11-.86a5.55 5.55 0 01-.73-.24c-.67-.29-1.39-.73-1.68-1.42-.45-1.07.13-2.32 1.25-2.73.95-.35 2.01-.1 2.76.62.5.48.87 1.05 1.15 1.64.21.43.91.43 1.12 0 .5-.99.78-2.11.78-3.29 0-5.52-4.48-10-10-10z"/></svg>
                        </button>
                    </div>
                    <p class="text-center mt-8 text-sm text-slate-400">
                        还没有账号？<button onclick="switchView('view-register')" class="text-blue-600 font-medium ml-1">立即注册</button>
                    </p>
                </div>
            </div>

            <!-- View: Login (SMS) -->
            <div id="view-login-sms" class="absolute inset-0 p-8 flex flex-col transition-all duration-300 bg-white translate-x-full z-10 invisible">
                <div class="mt-8 mb-8">
                    <button onclick="switchView('view-login-pwd')" class="mb-6 text-slate-400 hover:text-slate-900 flex items-center">
                        <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                        返回
                    </button>
                    <h1 class="text-2xl font-bold text-slate-900 tracking-tight">手机快捷登录</h1>
                    <p class="text-slate-500 mt-2 text-sm">未注册手机号将自动创建账号</p>
                </div>

                <div class="space-y-6">
                    <div>
                        <label class="text-xs text-gray-400 font-medium block mb-1">手机号码</label>
                        <input type="tel" maxlength="11" id="sms-phone" class="w-full px-0 py-2 border-b border-gray-200 focus:border-blue-600 outline-none text-xl font-medium tracking-wide bg-transparent" placeholder="1XX XXXX XXXX">
                    </div>
                    <div>
                         <label class="text-xs text-gray-400 font-medium block mb-1">验证码</label>
                        <div class="flex items-center border-b border-gray-200 focus-within:border-blue-600 transition-colors">
                            <input type="tel" maxlength="6" class="w-full px-0 py-2 outline-none text-xl font-medium space-x-2 tracking-[0.5em] bg-transparent placeholder:tracking-normal" placeholder="请输入6位验证码">
                            <button onclick="sendCode(this)" class="shrink-0 text-sm font-medium text-blue-600 px-3 py-1.5 rounded disabled:text-gray-400 whitespace-nowrap">获取验证码</button>
                        </div>
                    </div>
                </div>

                <button onclick="handleLogin()" class="w-full mt-10 bg-blue-600 hover:bg-blue-700 active:scale-[0.98] transition-all text-white py-4 rounded-xl font-semibold shadow-lg shadow-blue-200 text-lg">
                    登录 / 注册
                </button>

                 <div class="mt-4 text-center">
                    <label class="inline-flex items-center text-xs text-gray-400">
                        <input type="checkbox" checked class="form-checkbox text-blue-600 rounded border-gray-300 w-4 h-4 mr-2">
                        我已阅读并同意 <a href="#" class="text-blue-600 ml-1">用户协议</a> 与 <a href="#" class="text-blue-600 ml-1">隐私政策</a>
                    </label>
                </div>
            </div>

            <!-- View: Register -->
            <div id="view-register" class="absolute inset-0 p-8 flex flex-col transition-all duration-300 bg-white translate-x-full z-10 invisible">
                <div class="mt-4 mb-6">
                     <button onclick="switchView('view-login-pwd')" class="mb-4 text-slate-400 hover:text-slate-900 flex items-center">
                        <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                        返回登录
                    </button>
                    <h1 class="text-2xl font-bold text-slate-900 tracking-tight">注册新账号</h1>
                </div>

                <div class="space-y-5">
                    <div>
                        <input type="tel" maxlength="11" class="w-full px-0 py-3 border-b border-gray-200 focus:border-blue-600 outline-none text-lg bg-transparent" placeholder="手机号码">
                    </div>
                    <div class="relative flex items-center border-b border-gray-200 focus-within:border-blue-600">
                        <input type="tel" maxlength="6" class="w-full px-0 py-3 outline-none text-lg bg-transparent" placeholder="短信验证码">
                        <button onclick="sendCode(this)" class="absolute right-0 text-sm font-medium text-blue-600 py-2">获取验证码</button>
                    </div>
                    <div class="relative">
                        <input type="password" class="w-full px-0 py-3 border-b border-gray-200 focus:border-blue-600 outline-none text-lg bg-transparent" placeholder="设置登录密码 (6-20位)">
                        <button onclick="togglePwdVisibility(this)" class="absolute right-0 top-4 text-gray-400">
                             <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                        </button>
                    </div>
                </div>

                <div class="mt-6 text-xs text-slate-400 leading-relaxed">
                    密码必须包含字母和数字，且长度在6-20位之间。
                </div>

                <button onclick="handleRegister()" class="w-full mt-8 bg-slate-900 hover:bg-black active:scale-[0.98] transition-all text-white py-4 rounded-xl font-semibold shadow-lg shadow-gray-200 text-lg">
                    立即注册
                </button>

                 <div class="mt-4 text-center">
                    <label class="inline-flex items-center text-xs text-gray-400">
                        <input type="checkbox" id="reg-agreement" class="form-checkbox text-blue-600 rounded border-gray-300 w-4 h-4 mr-2">
                        同意 <a href="#" class="text-blue-600">用户协议</a> 与 <a href="#" class="text-blue-600">隐私政策</a>
                    </label>
                </div>
            </div>

        </main>
        
        <!-- Home Indicator Simulator -->
        <div class="h-8 bg-white flex justify-center items-center shrink-0 z-20">
            <div class="w-32 h-1 bg-slate-900 rounded-full mb-2"></div>
        </div>

    </div>

    <!-- Toast Component -->
    <div id="toast" class="fixed top-12 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-xl z-50 transition-all duration-300 opacity-0 translate-y-[-20px] pointer-events-none flex items-center">
        <svg class="w-5 h-5 mr-2 text-green-400 hidden" id="toast-icon-success" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
        <svg class="w-5 h-5 mr-2 text-red-400 hidden" id="toast-icon-error" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <span id="toast-msg" class="text-sm font-medium">Message</span>
    </div>

    <script>
        // --- Navigation Logic ---
        function switchView(viewId) {
            const views = ['view-login-pwd', 'view-login-sms', 'view-register'];
            
            views.forEach(id => {
                const el = document.getElementById(id);
                if (id === viewId) {
                    el.classList.remove('invisible', 'translate-x-full', '-translate-x-full');
                    el.classList.add('fade-in'); // Add logic for slide animation if simpler
                } else {
                     el.classList.add('invisible');
                     // Simple Reset: just hide. For better animation, manage stack history.
                }
            });
        }

        // --- Interaction Logic ---

        function togglePwdVisibility(btn) {
            const input = btn.previousElementSibling;
            if (input.type === 'password') {
                input.type = 'text';
                btn.classList.add('text-blue-600');
                btn.classList.remove('text-gray-400');
            } else {
                input.type = 'password';
                btn.classList.remove('text-blue-600');
                btn.classList.add('text-gray-400');
            }
        }

        function sendCode(btn) {
            if (btn.disabled) return;
            
            // Mock Validation: Check if previous input has value
            // Finding the closest phone input is a bit hacky here, assuming structure
            const container = btn.closest('.space-y-6') || btn.closest('.relative');
            // ... Simplified for demo

            showToast('验证码已发送: 8846', 'success');
            
            let count = 60;
            const originalText = btn.innerText;
            btn.disabled = true;
            btn.innerText = `${count}s`;
            btn.classList.add('text-gray-400');
            btn.classList.remove('text-blue-600');
            
            const timer = setInterval(() => {
                count--;
                btn.innerText = `${count}s`;
                if (count <= 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.innerText = '重新获取';
                    btn.classList.remove('text-gray-400');
                    btn.classList.add('text-blue-600');
                }
            }, 1000);
        }

        function handleLogin() {
            // Mock Loading
            const btn = document.activeElement;
            const originalText = btn.innerText;
            btn.innerHTML = '<svg class="animate-spin h-5 w-5 text-white mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>';
            
            setTimeout(() => {
                btn.innerText = originalText;
                showToast('登录成功！欢迎回来', 'success');
            }, 1500);
        }

        function handleRegister() {
            const agreement = document.getElementById('reg-agreement');
            if (!agreement.checked) {
                showToast('请先阅读并同意用户协议', 'error');
                return;
            }

             // Mock Loading
            const btn = document.activeElement;
            const originalText = btn.innerText;
            btn.innerHTML = '<svg class="animate-spin h-5 w-5 text-white mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>';

            setTimeout(() => {
                btn.innerText = originalText;
                showToast('注册成功！', 'success');
                setTimeout(() => switchView('view-login-pwd'), 1000);
            }, 1500);
        }

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            const msgEl = document.getElementById('toast-msg');
            const iconSuccess = document.getElementById('toast-icon-success');
            const iconError = document.getElementById('toast-icon-error');

            msgEl.innerText = msg;
            
            if (type === 'success') {
                iconSuccess.classList.remove('hidden');
                iconError.classList.add('hidden');
            } else {
                iconSuccess.classList.add('hidden');
                iconError.classList.remove('hidden');
            }

            toast.classList.remove('opacity-0', 'translate-y-[-20px]');
            
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-[-20px]');
            }, 3000);
        }
    </script>
</body>
</html>
