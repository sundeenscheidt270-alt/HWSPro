<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品管理 - 维他很忙ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div id="app" class="min-h-screen flex">
        <!-- 侧边栏 -->
        <aside id="sidebar" class="w-64 bg-white shadow-lg">
            <div class="p-4 border-b">
                <h1 class="text-xl font-bold text-blue-600">维他很忙ERP</h1>
            </div>
            <nav class="p-4">
                <div class="text-xs text-gray-500 mb-2">商品管理</div>
                <div class="mb-1 px-3 py-2 bg-blue-50 text-blue-600 rounded text-sm cursor-pointer">商品档案</div>
                <div class="mb-1 px-3 py-2 text-gray-600 hover:bg-gray-50 rounded text-sm cursor-pointer" onclick="showNearExpiry()">临期商品</div>
                <div class="mb-1 px-3 py-2 text-gray-600 hover:bg-gray-50 rounded text-sm cursor-pointer">分类管理</div>
                <div class="mb-1 px-3 py-2 text-gray-600 hover:bg-gray-50 rounded text-sm cursor-pointer">品牌管理</div>
                <div class="mb-1 px-3 py-2 text-gray-600 hover:bg-gray-50 rounded text-sm cursor-pointer">供应商商品</div>
                <div class="text-xs text-gray-500 mb-2 mt-4">其他模块</div>
                <div class="mb-1 px-3 py-2 text-gray-600 hover:bg-gray-50 rounded text-sm cursor-pointer">采购管理</div>
                <div class="mb-1 px-3 py-2 text-gray-600 hover:bg-gray-50 rounded text-sm cursor-pointer">库存管理</div>
            </nav>
        </aside>

        <!-- 主内容 -->
        <main class="flex-1 overflow-auto">
            <!-- 顶部导航 -->
            <header class="bg-white shadow-sm p-4 flex justify-between items-center sticky top-0 z-10">
                <div class="flex items-center gap-4">
                    <button onclick="toggleSidebar()" class="text-gray-600 hover:text-gray-800">☰</button>
                    <h2 class="text-xl font-bold">商品档案管理</h2>
                </div>
                <div class="flex items-center gap-4">
                    <button class="text-gray-600 hover:text-gray-800">🔔 <span class="text-xs bg-red-500 text-white rounded-full px-1">3</span></button>
                    <div class="flex items-center gap-2 cursor-pointer">
                        <div class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center text-white text-xs">商品专员</div>
                        <span class="text-sm">张三</span>
                    </div>
                </div>
            </header>

            <div class="p-6">
                <!-- 指标卡 -->
                <div class="grid grid-cols-5 gap-4 mb-6">
                    <div class="bg-white p-4 rounded-lg shadow-sm border-l-4 border-blue-500">
                        <div class="text-gray-500 text-xs mb-1">商品总数</div>
                        <div class="text-2xl font-bold text-blue-600">5,234</div>
                        <div class="text-xs text-gray-400 mt-1">已上架: 4,892</div>
                    </div>
                    <div class="bg-white p-4 rounded-lg shadow-sm border-l-4 border-orange-500">
                        <div class="text-gray-500 text-xs mb-1">待配置</div>
                        <div class="text-2xl font-bold text-orange-600">12</div>
                        <div class="text-xs text-gray-400 mt-1">待上架商品</div>
                    </div>
                    <div class="bg-white p-4 rounded-lg shadow-sm border-l-4 border-red-500">
                        <div class="text-gray-500 text-xs mb-1">临期预警</div>
                        <div class="text-2xl font-bold text-red-600">8</div>
                        <div class="text-xs text-gray-400 mt-1">保质期≤30%</div>
                    </div>
                    <div class="bg-white p-4 rounded-lg shadow-sm border-l-4 border-gray-500">
                        <div class="text-gray-500 text-xs mb-1">已暂停</div>
                        <div class="text-2xl font-bold text-gray-600">330</div>
                        <div class="text-xs text-gray-400 mt-1">临时下架</div>
                    </div>
                    <div class="bg-white p-4 rounded-lg shadow-sm border-l-4 border-purple-500">
                        <div class="text-gray-500 text-xs mb-1">批次管理</div>
                        <div class="text-2xl font-bold text-purple-600">98%</div>
                        <div class="text-xs text-gray-400 mt-1">覆盖率</div>
                    </div>
                </div>

                <!-- 筛选区 -->
                <div class="bg-white rounded-lg shadow-sm p-4 mb-4">
                    <div class="grid grid-cols-5 gap-3 mb-3">
                        <input type="text" id="searchInput" placeholder="商品名称/编码/条码" class="border rounded px-3 py-2 text-sm">
                        <select id="categoryFilter" class="border rounded px-3 py-2 text-sm">
                            <option value="">全部分类</option>
                            <option value="休闲零食">休闲零食</option>
                            <option value="饮品">饮品</option>
                            <option value="冷冻冷藏">冷冻冷藏</option>
                            <option value="进口零食">进口零食</option>
                        </select>
                        <select id="temperatureFilter" class="border rounded px-3 py-2 text-sm">
                            <option value="">全部温区</option>
                            <option value="NORMAL">常温</option>
                            <option value="COLD">冷藏</option>
                            <option value="FROZEN">冷冻</option>
                        </select>
                        <select id="statusFilter" class="border rounded px-3 py-2 text-sm">
                            <option value="">全部状态</option>
                            <option value="DRAFT">草稿</option>
                            <option value="PENDING_CONFIG">待配置</option>
                            <option value="ACTIVE">已上架</option>
                            <option value="SUSPENDED">已暂停</option>
                            <option value="OBSOLETE">已淘汰</option>
                        </select>
                        <button onclick="handleSearch()" class="bg-blue-600 text-white rounded px-4 py-2 hover:bg-blue-700 text-sm">🔍 搜索</button>
                    </div>
                    <div class="flex gap-2">
                        <select class="border rounded px-3 py-1 text-sm text-gray-600">
                            <option>品牌筛选</option>
                        </select>
                        <select class="border rounded px-3 py-1 text-sm text-gray-600">
                            <option>供应商筛选</option>
                        </select>
                        <button class="text-blue-600 hover:underline text-sm">高级筛选</button>
                        <button onclick="resetFilters()" class="text-gray-600 hover:underline text-sm">重置</button>
                    </div>
                </div>

                <!-- 操作栏 -->
                <div class="bg-white rounded-lg shadow-sm p-3 mb-4 flex justify-between items-center">
                    <div class="flex gap-2">
                        <button onclick="openAddModal()" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700 text-sm">+ 新增商品</button>
                        <button class="border border-gray-300 px-4 py-2 rounded hover:bg-gray-50 text-sm">批量上架</button>
                        <button class="border border-gray-300 px-4 py-2 rounded hover:bg-gray-50 text-sm">批量下架</button>
                        <button class="border border-gray-300 px-4 py-2 rounded hover:bg-gray-50 text-sm">导入商品</button>
                    </div>
                    <div class="flex gap-2">
                        <button class="border border-gray-300 px-4 py-2 rounded hover:bg-gray-50 text-sm">📥 导出数据</button>
                        <button class="border border-gray-300 px-4 py-2 rounded hover:bg-gray-50 text-sm">打印</button>
                    </div>
                </div>

                <!-- 数据列表 -->
                <div class="bg-white rounded-lg shadow-sm overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead class="bg-gray-50 border-b">
                                <tr>
                                    <th class="px-4 py-3 text-left text-xs font-semibold text-gray-600">
                                        <input type="checkbox" class="rounded">
                                    </th>
                                    <th class="px-4 py-3 text-left text-xs font-semibold text-gray-600">商品编码</th>
                                    <th class="px-4 py-3 text-left text-xs font-semibold text-gray-600">商品名称</th>
                                    <th class="px-4 py-3 text-left text-xs font-semibold text-gray-600">条码</th>
                                    <th class="px-4 py-3 text-left text-xs font-semibold text-gray-600">分类</th>
                                    <th class="px-4 py-3 text-left text-xs font-semibold text-gray-600">规格</th>
                                    <th class="px-4 py-3 text-left text-xs font-semibold text-gray-600">温区</th>
                                    <th class="px-4 py-3 text-left text-xs font-semibold text-gray-600">保质期</th>
                                    <th class="px-4 py-3 text-left text-xs font-semibold text-gray-600">总部价</th>
                                    <th class="px-4 py-3 text-left text-xs font-semibold text-gray-600">状态</th>
                                    <th class="px-4 py-3 text-left text-xs font-semibold text-gray-600">操作</th>
                                </tr>
                            </thead>
                            <tbody id="productTable"></tbody>
                        </table>
                    </div>

                    <!-- 分页 -->
                    <div class="border-t p-3 flex justify-between items-center bg-gray-50">
                        <div class="text-sm text-gray-600">
                            共 <span id="totalCount" class="font-semibold">20</span> 条数据，
                            每页显示 <select class="border rounded px-2 py-1 text-sm" onchange="changePageSize(this.value)">
                                <option value="10">10</option>
                                <option value="20">20</option>
                                <option value="50">50</option>
                            </select> 条
                        </div>
                        <div class="flex gap-2">
                            <button onclick="prevPage()" class="border px-3 py-1 rounded hover:bg-white text-sm">上一页</button>
                            <div class="flex gap-1">
                                <button class="border px-3 py-1 rounded bg-blue-600 text-white text-sm">1</button>
                                <button class="border px-3 py-1 rounded hover:bg-white text-sm">2</button>
                                <button class="border px-3 py-1 rounded hover:bg-white text-sm">3</button>
                            </div>
                            <button onclick="nextPage()" class="border px-3 py-1 rounded hover:bg-white text-sm">下一页</button>
                            <span class="text-sm text-gray-600 ml-2">跳转到 <input type="number" class="border rounded w-12 px-2 py-1 text-sm" min="1"> 页</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 商品详情抽屉 -->
    <div id="detailDrawer" class="hidden fixed inset-y-0 right-0 w-2/3 bg-white shadow-2xl z-50 overflow-y-auto">
        <div class="sticky top-0 bg-white border-b p-4 flex justify-between items-center z-10">
            <h3 class="text-lg font-bold">商品详情</h3>
            <button onclick="closeDrawer()" class="text-gray-600 hover:text-gray-800 text-2xl">×</button>
        </div>
        <div id="detailContent" class="p-6"></div>
    </div>

    <!-- 新增/编辑弹窗 -->
    <div id="productModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg w-2/3 max-h-[90vh] overflow-y-auto">
            <div class="sticky top-0 bg-white border-b p-4 flex justify-between items-center">
                <h3 class="text-lg font-bold">新增商品</h3>
                <button onclick="closeModal()" class="text-gray-600 hover:text-gray-800 text-2xl">×</button>
            </div>
            <form id="productForm" class="p-6">
                <div class="mb-6">
                    <h4 class="text-md font-semibold mb-3 text-blue-600">基础信息</h4>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium mb-1">商品编码 <span class="text-red-500">*</span></label>
                            <input type="text" name="product_code" class="w-full border rounded px-3 py-2 text-sm" placeholder="由PMS系统生成" readonly>
                            <div class="text-xs text-gray-500 mt-1">由PMS系统统一生成，不可手动输入</div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">条码 <span class="text-red-500">*</span></label>
                            <input type="text" name="barcode" class="w-full border rounded px-3 py-2 text-sm" placeholder="EAN-13或EAN-8" required>
                        </div>
                        <div class="col-span-2">
                            <label class="block text-sm font-medium mb-1">商品名称 <span class="text-red-500">*</span></label>
                            <input type="text" name="product_name" class="w-full border rounded px-3 py-2 text-sm" placeholder="完整商品名称" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">商品简称</label>
                            <input type="text" name="product_short_name" class="w-full border rounded px-3 py-2 text-sm" placeholder="门店显示用">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">规格</label>
                            <input type="text" name="spec" class="w-full border rounded px-3 py-2 text-sm" placeholder="如：500g、330ml×24罐">
                        </div>
                    </div>
                </div>

                <div class="mb-6">
                    <h4 class="text-md font-semibold mb-3 text-blue-600">分类与属性</h4>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium mb-1">商品分类 <span class="text-red-500">*</span></label>
                            <select name="category" class="w-full border rounded px-3 py-2 text-sm" required>
                                <option value="">请选择</option>
                                <option>休闲零食 > 坚果炒货</option>
                                <option>休闲零食 > 膨化食品</option>
                                <option>饮品 > 功能饮料</option>
                                <option>冷冻冷藏 > 冰淇淋</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">品牌</label>
                            <select name="brand" class="w-full border rounded px-3 py-2 text-sm">
                                <option value="">请选择</option>
                                <option>三只松鼠</option>
                                <option>百草味</option>
                                <option>良品铺子</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">销售单位 <span class="text-red-500">*</span></label>
                            <input type="text" name="unit" class="w-full border rounded px-3 py-2 text-sm" placeholder="如：瓶、袋、盒" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">箱规 <span class="text-red-500">*</span></label>
                            <input type="number" name="case_pack" class="w-full border rounded px-3 py-2 text-sm" placeholder="一箱多少个销售单位" min="1" required>
                        </div>
                    </div>
                </div>

                <div class="mb-6">
                    <h4 class="text-md font-semibold mb-3 text-blue-600">存储与批次</h4>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium mb-1">温区 <span class="text-red-500">*</span></label>
                            <select name="temperature_zone" class="w-full border rounded px-3 py-2 text-sm" required>
                                <option value="">请选择</option>
                                <option value="NORMAL">常温 (10-30℃)</option>
                                <option value="COLD">冷藏 (2-8℃)</option>
                                <option value="FROZEN">冷冻 (-18℃以下)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">保质期天数 <span class="text-red-500">*</span></label>
                            <input type="number" name="shelf_life_days" class="w-full border rounded px-3 py-2 text-sm" placeholder="如：365天" min="1" required>
                        </div>
                        <div class="col-span-2">
                            <label class="flex items-center">
                                <input type="checkbox" name="is_batch_managed" class="rounded mr-2" checked>
                                <span class="text-sm">启用批次管理（食品类强制启用）</span>
                            </label>
                        </div>
                        <div class="col-span-2">
                            <label class="flex items-center">
                                <input type="checkbox" name="is_weight_item" class="rounded mr-2">
                                <span class="text-sm">称重商品</span>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="mb-6">
                    <h4 class="text-md font-semibold mb-3 text-blue-600">价格信息</h4>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium mb-1">总部价（元） <span class="text-red-500">*</span></label>
                            <input type="number" name="hq_price" class="w-full border rounded px-3 py-2 text-sm" placeholder="全国统一价" min="0" step="0.01" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">会员价（元）</label>
                            <input type="number" name="member_price" class="w-full border rounded px-3 py-2 text-sm" placeholder="会员专享价" min="0" step="0.01">
                        </div>
                    </div>
                </div>

                <div class="mb-6">
                    <h4 class="text-md font-semibold mb-3 text-blue-600">供应商信息</h4>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium mb-1">主供应商 <span class="text-red-500">*</span></label>
                            <select name="supplier" class="w-full border rounded px-3 py-2 text-sm" required>
                                <option value="">请选择</option>
                                <option>深圳XX食品有限公司</option>
                                <option>上海XX贸易有限公司</option>
                                <option>广州XX供应链有限公司</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">采购合同价（元）</label>
                            <input type="number" name="contract_price" class="w-full border rounded px-3 py-2 text-sm" placeholder="采购成本价" min="0" step="0.01">
                        </div>
                    </div>
                </div>

                <div class="border-t pt-4 flex justify-end gap-2">
                    <button type="button" onclick="closeModal()" class="border border-gray-300 px-6 py-2 rounded hover:bg-gray-50">取消</button>
                    <button type="button" class="bg-gray-600 text-white px-6 py-2 rounded hover:bg-gray-700">保存草稿</button>
                    <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700">保存并上架</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 遮罩层 -->
    <div id="overlay" class="hidden fixed inset-0 bg-black bg-opacity-30 z-40" onclick="closeDrawer()"></div>

    <!-- Toast -->
    <div id="toast" class="hidden fixed top-4 right-4 px-6 py-3 rounded-lg shadow-lg z-50"></div>

            {id: 15, code: '01ABC0001248', name: '统一冰红茶500ml×15瓶', barcode: '4710088320025', category: '饮品', spec: '500ml×15瓶', temp: 'NORMAL', shelfLife: 365, price: 42.00, status: 'ACTIVE'},
            {id: 16, code: '01ABC0001249', name: '奥利奥饼干', barcode: '6901443120567', category: '休闲零食', spec: '349g', temp: 'NORMAL', shelfLife: 365, price: 19.90, status: 'ACTIVE'},
            {id: 17, code: '01ABC0001250', name: '蒙牛酸奶', barcode: '6921355410056', category: '冷冻冷藏', spec: '230g×12杯', temp: 'COLD', shelfLife: 21, price: 45.60, status: 'ACTIVE'},
            {id: 18, code: '01ABC0001251', name: '德芙巧克力', barcode: '6901234554321', category: '休闲零食', spec: '252g', temp: 'NORMAL', shelfLife: 365, price: 58.00, status: 'SUSPENDED'},
            {id: 19, code: '01ABC0001252', name: '康师傅冰红茶', barcode: '4710088220036', category: '饮品', spec: '500ml×15瓶', temp: 'NORMAL', shelfLife: 365, price: 40.50, status: 'ACTIVE'},
            {id: 20, code: '01ABC0001253', name: '雀巢冰淇淋', barcode: '6901234567654', category: '冷冻冷藏', spec: '67g×6支', temp: 'FROZEN', shelfLife: 365, price: 36.00, status: 'ACTIVE'}
        ];

        let state = {
            data: mockData,
            filteredData: mockData,
            currentPage: 1,
            pageSize: 10
        };

        const statusMap = {
            'DRAFT': {text: '草稿', class: 'bg-gray-100 text-gray-600'},
            'PENDING_CONFIG': {text: '待配置', class: 'bg-yellow-100 text-yellow-700'},
            'ACTIVE': {text: '已上架', class: 'bg-green-100 text-green-700'},
            'SUSPENDED': {text: '已暂停', class: 'bg-orange-100 text-orange-700'},
            'OBSOLETE': {text: '已淘汰', class: 'bg-red-100 text-red-700'}
        };

        const tempMap = {'NORMAL': '常温', 'COLD': '冷藏', 'FROZEN': '冷冻'};

        function render() {
            const start = (state.currentPage - 1) * state.pageSize;
            const pageData = state.filteredData.slice(start, start + state.pageSize);
            
            document.getElementById('productTable').innerHTML = pageData.map(item => `
                <tr class="border-b hover:bg-blue-50 transition-colors">
                    <td class="px-4 py-3"><input type="checkbox" class="rounded"></td>
                    <td class="px-4 py-3 text-sm font-mono text-blue-600 cursor-pointer hover:underline" onclick='showDetail(${item.id})'>${item.code}</td>
                    <td class="px-4 py-3 text-sm font-medium">${item.name}</td>
                    <td class="px-4 py-3 text-sm text-gray-600">${item.barcode}</td>
                    <td class="px-4 py-3 text-sm">${item.category}</td>
                    <td class="px-4 py-3 text-sm text-gray-600">${item.spec}</td>
                    <td class="px-4 py-3 text-sm">
                        <span class="px-2 py-1 rounded text-xs ${item.temp === 'COLD' ? 'bg-blue-100 text-blue-700' : item.temp === 'FROZEN' ? 'bg-purple-100 text-purple-700' : 'bg-gray-100 text-gray-700'}">
                            ${tempMap[item.temp]}
                        </span>
                    </td>
                    <td class="px-4 py-3 text-sm text-gray-600">${item.shelfLife}天</td>
                    <td class="px-4 py-3 text-sm font-semibold text-green-600">¥${item.price.toFixed(2)}</td>
                    <td class="px-4 py-3">
                        <span class="px-2 py-1 rounded text-xs font-medium ${statusMap[item.status].class}">
                            ${statusMap[item.status].text}
                        </span>
                    </td>
                    <td class="px-4 py-3">
                        <div class="flex gap-2 text-sm">
                            <button onclick='showDetail(${item.id})' class="text-blue-600 hover:underline">查看</button>
                            <button onclick='editProduct(${item.id})' class="text-blue-600 hover:underline">编辑</button>
                            ${item.status === 'ACTIVE' ? 
                                `<button onclick='suspendProduct(${item.id})' class="text-orange-600 hover:underline">下架</button>` : 
                                item.status === 'SUSPENDED' ?
                                `<button onclick='activateProduct(${item.id})' class="text-green-600 hover:underline">上架</button>` :
                                ''
                            }
                        </div>
                    </td>
                </tr>
            `).join('');

            document.getElementById('totalCount').textContent = state.filteredData.length;
        }

        window.showDetail = (id) => {
            const product = state.data.find(p => p.id === id);
            document.getElementById('detailContent').innerHTML = `
                <div class="space-y-6">
                    <div class="flex justify-between items-start">
                        <div>
                            <h4 class="text-xl font-bold mb-2">${product.name}</h4>
                            <div class="flex gap-2">
                                <span class="px-3 py-1 rounded text-sm font-medium ${statusMap[product.status].class}">${statusMap[product.status].text}</span>
                                <span class="px-3 py-1 rounded text-sm bg-blue-100 text-blue-700">${tempMap[product.temp]}</span>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-3xl font-bold text-green-600">¥${product.price.toFixed(2)}</div>
                            <div class="text-sm text-gray-500">总部价</div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-6">
                        <div class="bg-gray-50 p-4 rounded-lg">
                            <h5 class="font-semibold mb-3 text-blue-600">基础信息</h5>
                            <div class="space-y-2 text-sm">
                                <div class="flex justify-between"><span class="text-gray-600">商品编码:</span><span class="font-mono">${product.code}</span></div>
                                <div class="flex justify-between"><span class="text-gray-600">条码:</span><span class="font-mono">${product.barcode}</span></div>
                                <div class="flex justify-between"><span class="text-gray-600">分类:</span><span>${product.category}</span></div>
                                <div class="flex justify-between"><span class="text-gray-600">规格:</span><span>${product.spec}</span></div>
                                <div class="flex justify-between"><span class="text-gray-600">保质期:</span><span>${product.shelfLife}天</span></div>
                                <div class="flex justify-between"><span class="text-gray-600">批次管理:</span><span class="text-green-600">✓ 已启用</span></div>
                            </div>
                        </div>

                        <div class="bg-gray-50 p-4 rounded-lg">
                            <h5 class="font-semibold mb-3 text-blue-600">价格体系</h5>
                            <div class="space-y-2 text-sm">
                                <div class="flex justify-between"><span class="text-gray-600">总部价:</span><span class="font-semibold text-green-600">¥${product.price.toFixed(2)}</span></div>
                                <div class="flex justify-between"><span class="text-gray-600">会员价:</span><span class="font-semibold text-purple-600">¥${(product.price * 0.95).toFixed(2)}</span></div>
                                <div class="flex justify-between"><span class="text-gray-600">区域价:</span><span class="text-gray-500">未配置</span></div>
                                <div class="flex justify-between"><span class="text-gray-600">门店价:</span><span class="text-gray-500">未配置</span></div>
                            </div>
                        </div>

                        <div class="bg-gray-50 p-4 rounded-lg">
                            <h5 class="font-semibold mb-3 text-blue-600">供应商信息</h5>
                            <div class="space-y-2 text-sm">
                                <div class="flex justify-between"><span class="text-gray-600">主供应商:</span><span>深圳XX食品有限公司</span></div>
                                <div class="flex justify-between"><span class="text-gray-600">合同价:</span><span class="font-semibold">¥${(product.price * 0.7).toFixed(2)}</span></div>
                                <div class="flex justify-between"><span class="text-gray-600">供货周期:</span><span>7天</span></div>
                                <div class="flex justify-between"><span class="text-gray-600">最小起订量:</span><span>100箱</span></div>
                            </div>
                        </div>

                        <div class="bg-gray-50 p-4 rounded-lg">
                            <h5 class="font-semibold mb-3 text-blue-600">库存信息</h5>
                            <div class="space-y-2 text-sm">
                                <div class="flex justify-between"><span class="text-gray-600">可用库存:</span><span class="font-semibold text-green-600">1,234</span></div>
                                <div class="flex justify-between"><span class="text-gray-600">锁定库存:</span><span>56</span></div>
                                <div class="flex justify-between"><span class="text-gray-600">在途库存:</span><span>120</span></div>
                                <div class="flex justify-between"><span class="text-gray-600">临期数量:</span><span class="${product.shelfLife < 60 ? 'text-red-600 font-semibold' : 'text-gray-500'}">0</span></div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-yellow-50 p-4 rounded-lg border border-yellow-200">
                        <h5 class="font-semibold mb-3 text-yellow-800">📋 操作历史</h5>
                        <div class="space-y-2 text-sm">
                            <div class="flex justify-between text-gray-600">
                                <span>2025-12-20 10:23</span>
                                <span>商品专员-张三</span>
                                <span>商品上架</span>
                            </div>
                            <div class="flex justify-between text-gray-600">
                                <span>2025-12-19 15:40</span>
                                <span>商品专员-张三</span>
                                <span>配置总部价: ¥${product.price.toFixed(2)}</span>
                            </div>
                            <div class="flex justify-between text-gray-600">
                                <span>2025-12-19 14:12</span>
                                <span>系统</span>
                                <span>从PMS同步商品数据</span>
                            </div>
                        </div>
                    </div>

                    <div class="flex gap-3 pt-4 border-t">
                        <button onclick="editProduct(${id})" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700">编辑商品</button>
                        <button class="bg-purple-600 text-white px-6 py-2 rounded hover:bg-purple-700">配置价格</button>
                        ${product.status === 'ACTIVE' ? 
                            `<button onclick="suspendProduct(${id})" class="bg-orange-600 text-white px-6 py-2 rounded hover:bg-orange-700">暂停销售</button>` :
                            `<button onclick="activateProduct(${id})" class="bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700">恢复上架</button>`
                        }
                        <button class="border border-gray-300 px-6 py-2 rounded hover:bg-gray-50">查看批次</button>
                    </div>
                </div>
            `;
            document.getElementById('detailDrawer').classList.remove('hidden');
            document.getElementById('overlay').classList.remove('hidden');
        };

        window.handleSearch = () => {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const category = document.getElementById('categoryFilter').value;
            const temp = document.getElementById('temperatureFilter').value;
            const status = document.getElementById('statusFilter').value;

            state.filteredData = state.data.filter(item => {
                const matchSearch = !search || item.name.toLowerCase().includes(search) || item.code.toLowerCase().includes(search) || item.barcode.includes(search);
                const matchCategory = !category || item.category === category;
                const matchTemp = !temp || item.temp === temp;
                const matchStatus = !status || item.status === status;
                return matchSearch && matchCategory && matchTemp && matchStatus;
            });
            
            state.currentPage = 1;
            render();
        };

        window.resetFilters = () => {
            document.getElementById('searchInput').value = '';
            document.getElementById('categoryFilter').value = '';
            document.getElementById('temperatureFilter').value = '';
            document.getElementById('statusFilter').value = '';
            state.filteredData = state.data;
            state.currentPage = 1;
            render();
        };

        window.showNearExpiry = () => {
            state.filteredData = state.data.filter(item => item.shelfLife <= 60);
            state.currentPage = 1;
            render();
            showToast('已筛选临期商品（保质期≤60天）', 'info');
        };

        window.openAddModal = () => {
            document.getElementById('productModal').classList.remove('hidden');
        };

        window.closeModal = () => {
            document.getElementById('productModal').classList.add('hidden');
            document.getElementById('productForm').reset();
        };

        window.closeDrawer = () => {
            document.getElementById('detailDrawer').classList.add('hidden');
            document.getElementById('overlay').classList.add('hidden');
        };

        window.editProduct = (id) => {
            openAddModal();
            showToast('编辑功能演示', 'info');
        };

        window.suspendProduct = (id) => {
            showToast('商品已下架', 'success');
            setTimeout(render, 500);
        };

        window.activateProduct = (id) => {
            showToast('商品已上架', 'success');
            setTimeout(render, 500);
        };

        window.prevPage = () => {
            if (state.currentPage > 1) { state.currentPage--; render(); }
        };

        window.nextPage = () => {
            const maxPage = Math.ceil(state.filteredData.length / state.pageSize);
            if (state.currentPage < maxPage) { state.currentPage++; render(); }
        };

        window.changePageSize = (size) => {
            state.pageSize = parseInt(size);
            state.currentPage = 1;
            render();
        };

        window.toggleSidebar = () => {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('w-64');
            sidebar.classList.toggle('w-16');
        };

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const colors = {
                success: 'bg-green-600',
                error: 'bg-red-600',
                info: 'bg-blue-600'
            };
            toast.className = `fixed top-4 right-4 px-6 py-3 rounded-lg shadow-lg z-50 text-white ${colors[type]}`;
            toast.textContent = message;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        document.getElementById('productForm').addEventListener('submit', (e) => {
            e.preventDefault();
            showToast('商品保存成功！', 'success');
            closeModal();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
                closeDrawer();
            }
        });

        render();
    </script>
</body>
</html>
